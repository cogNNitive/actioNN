<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iNNv0 — Documentation</title>
  <meta name="description" content="Technical documentation for the iNNv0 skills ecosystem for OpenCode.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #4D0E4E;
      --base-background: #FFFFFF;
      --textColor: #111112;
      --sidebar-background: #FFFFFF;
      --sidebar-border-color: #F2F2F7;
      --code-background: #FAFAFC;
      --code-color: #4D0E4E;
      --selection-color: #F0E6F0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', 'Geist Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .sidebar {
      border-right: 1px solid var(--sidebar-border-color);
    }

    .sidebar ul li a {
      color: #636366;
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar ul li.active > a {
      color: var(--theme-color);
      font-weight: 700;
      border-left: 3px solid var(--theme-color);
    }

    .sidebar .sidebar-nav ul li a:hover {
      color: var(--theme-color);
    }

    .sidebar-brand {
      padding: 16px 24px;
      font-weight: 800;
      font-size: 20px;
      color: var(--theme-color);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: block;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .sidebar-brand:hover { color: var(--theme-color); }

    .markdown-section h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--textColor);
    }

    .markdown-section h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--textColor);
      border-bottom: none;
    }

    .markdown-section h3 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--textColor);
    }

    .markdown-section code {
      font-family: 'JetBrains Mono', 'Geist Mono', monospace;
      font-size: 13px;
      background: var(--code-background);
      color: var(--code-color);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .markdown-section pre {
      background: var(--code-background) !important;
      border: 1px solid var(--sidebar-border-color);
      border-radius: 8px;
    }

    .markdown-section pre code {
      background: transparent;
      color: var(--textColor);
      padding: 0;
    }

    .markdown-section table {
      border-collapse: collapse;
    }

    .markdown-section th {
      background: #F6EEF6;
      color: var(--theme-color);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .markdown-section td, .markdown-section th {
      border: 1px solid var(--sidebar-border-color);
      padding: 10px 14px;
    }

    .markdown-section tr:nth-child(2n) {
      background: var(--code-background);
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      color: var(--textColor);
      background: #F6EEF6;
      padding: 12px 20px;
      border-radius: 0 8px 8px 0;
    }

    .markdown-section a {
      color: var(--theme-color);
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    .sidebar-toggle { background: transparent; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      repo: 'https://github.com/innV0/innv0-skills',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: false,
      search: 'auto',
      formatUpdated: '{YYYY}-{MM}-{DD}',
    }
  </script>
  <script>
    /* Inject sidebar brand */
    document.addEventListener('DOMContentLoaded', function() {
      var checkExist = setInterval(function() {
        var sidebar = document.querySelector('.sidebar');
        if (sidebar) {
          clearInterval(checkExist);
          var brand = document.createElement('a');
          brand.href = '/iNNv0_skills/docs/#/';
          brand.className = 'sidebar-brand';
          brand.textContent = 'iNNv0';
          sidebar.insertBefore(brand, sidebar.firstChild);
        }
      }, 100);
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
